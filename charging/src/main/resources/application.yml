    url: jdbc:mysql://81.70.228.227:3306/database_springboot_v2?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 1234567890wcvff
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000
  application:
    name: charging
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration
server:
  port: 8080
mybatis:
  # mapper.xml 文件位置
    mapper-locations: classpath:mapper/*.xml
  # 实体类包路径
    type-aliases-package: cyou.tianshu.charging.entity
  # 开启驼峰命名自动映射
    configuration:
      map-underscore-to-camel-case: true
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 打印 SQL 日志
    
# 日志配置
logging:
    level:
      cyou.tianshu.charging.mapper: debug  # mapper 包日志级别

jwt:
  secret: "charging-station-jwt-secret-key-2025-at-least-32-chars"
  expiration: 86400  # Token过期时间(秒)，24小时
  issuer: "charging-station-system"